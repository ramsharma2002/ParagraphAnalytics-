{% extends "base.html" %}

{% block content %}

<div class="card shadow-sm">
    <div class="card-body">

        <h5 class="mb-4">
            Top Results for "<span class="text-primary">{{ word }}</span>"
        </h5>

        <table class="table table-hover table-bordered mt-3">
            <thead class="table-light">
                <tr>
                    <th style="width: 70%">Paragraph</th>
                    <th style="width: 30%">Occurrences</th>
                </tr>
            </thead>
            <tbody>
                {% for para in results %}
                <tr>
                    <td>{{ para.content }}</td>
                    <td class="text-center fw-bold text-success">
                        {{ para.count }}
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2" class="text-center">
                        No paragraphs found
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <a href="/dashboard/" class="btn btn-secondary mt-3">
            ← Back to Dashboard
        </a>

    </div>
</div>

{% endblock %}

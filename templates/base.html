<!DOCTYPE html>
<html>
<head>
    <title>Paragraph Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
        }
        .sidebar {
            height: 100vh;
            background-color: #1f2937;
            color: white;
            padding: 20px;
        }
        .sidebar a {
            color: #cbd5e1;
            text-decoration: none;
            display: block;
            margin: 10px 0;
        }
        .sidebar a:hover {
            color: white;
        }
        .topbar {
            background: white;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        {% if request.user.is_authenticated %}
        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
            <h4>Analytics</h4>
            <hr>
            <a href="/dashboard/">Dashboard</a>
            <a href="/admin/">Admin Panel</a>
            <a href="#">Reports</a>
            <a href="#">Settings</a>

            <hr>
            <a href="{% url 'logout' %}" class="btn btn-danger w-100 mt-3">
                Logout
            </a>
        </div>
        {% endif %}

        <!-- Main Content -->
        <div class="{% if request.user.is_authenticated %}col-md-10{% else %}col-md-12{% endif %}">

            {% if request.user.is_authenticated %}
            <!-- Topbar -->
            <div class="topbar d-flex justify-content-between">
                <h5>Paragraph Analytics Dashboard</h5>
                <div>
                    Logged in as <strong>{{ request.user.email }}</strong>
                </div>
            </div>
            {% endif %}

            <div class="p-4">
                {% block content %}{% endblock %}
            </div>

        </div>

    </div>
</div>

</body>
</html>
